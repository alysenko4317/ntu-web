<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Піраміда з вписаною сферою</title>
  <style>
    body { margin: 0; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="glCanvas"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
  <script>
    // --- Ініціалізація WebGL ---
    const canvas = document.getElementById('glCanvas');
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    const gl = canvas.getContext('webgl');
   // if (!gl) return alert('WebGL не підтримується');

    // --- Загальні налаштування ---
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0,0,0,1);
    gl.clearDepth(1);
    gl.enable(gl.DEPTH_TEST);
    gl.depthFunc(gl.LEQUAL);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    // --- Шейдери ---
    const vsSource = `
      attribute vec3 aVertexPosition;
      attribute vec4 aVertexColor;
      uniform mat4 uProjectionMatrix;
      uniform mat4 uModelViewMatrix;
      varying lowp vec4 vColor;
      void main(void) {
        gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aVertexPosition,1.0);
        vColor = aVertexColor;
      }
    `;
    const fsSource = `
      varying lowp vec4 vColor;
      void main(void){
        gl_FragColor = vColor;
      }
    `;
    function loadShader(gl, type, src){
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
        console.error(gl.getShaderInfoLog(s));
        gl.deleteShader(s);
        return null;
      }
      return s;
    }
    function initShaderProgram(gl, vsS, fsS){
      const vs = loadShader(gl, gl.VERTEX_SHADER, vsS);
      const fs = loadShader(gl, gl.FRAGMENT_SHADER, fsS);
      const prog = gl.createProgram();
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
        console.error(gl.getProgramInfoLog(prog));
        return null;
      }
      return prog;
    }
    const shaderProgram = initShaderProgram(gl, vsSource, fsSource);
    const programInfo = {
      program: shaderProgram,
      attribLocations: {
        vertexPosition: gl.getAttribLocation(shaderProgram, 'aVertexPosition'),
        vertexColor:    gl.getAttribLocation(shaderProgram, 'aVertexColor'),
      },
      uniformLocations: {
        projectionMatrix: gl.getUniformLocation(shaderProgram, 'uProjectionMatrix'),
        modelViewMatrix:  gl.getUniformLocation(shaderProgram, 'uModelViewMatrix'),
      },
    };

    // --- Геометрія піраміди (з напівпрозорими гранями α=0.5) ---
    const pyramidVerts = [
       0,  1,  0,   -1, -1, -1,   1, -1, -1,   // грань 1
       0,  1,  0,    1, -1, -1,   1, -1,  1,   // 2
       0,  1,  0,    1, -1,  1,  -1, -1,  1,   // 3
       0,  1,  0,   -1, -1,  1,  -1, -1, -1,   // 4
      -1, -1, -1,    1, -1, -1,   1, -1,  1,   // 5 (основа)
      -1, -1, -1,    1, -1,  1,  -1, -1,  1,   // 6
    ];
    const pyramidCols = [];
    const pc = [
      [1,0,0,0.5],[0,1,0,0.5],[0,0,1,0.5],
      [1,1,0,0.5],[1,0,1,0.5],[1,0,1,0.5]
    ];
    for(let f=0;f<6;f++){
      for(let v=0;v<3;v++){
        pyramidCols.push(...pc[f]);
      }
    }
    const pPosBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, pPosBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(pyramidVerts), gl.STATIC_DRAW);
    const pColBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, pColBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(pyramidCols), gl.STATIC_DRAW);

    // --- Генерація сфери ---
    function makeSphere(latB, lonB, R){
      const pos = [], idx = [];
      for(let lat=0;lat<=latB;lat++){
        const θ = lat*Math.PI/latB;
        for(let lon=0;lon<=lonB;lon++){
          const φ = lon*2*Math.PI/lonB;
          pos.push(
            R*Math.sin(θ)*Math.cos(φ),
            R*Math.cos(θ),
            R*Math.sin(θ)*Math.sin(φ)
          );
        }
      }
      for(let lat=0;lat<latB;lat++){
        for(let lon=0;lon<lonB;lon++){
          const a = lat*(lonB+1)+lon,
                b = a + lonB+1;
          idx.push(a,b,a+1, b,b+1,a+1);
        }
      }
      return {pos, idx};
    }
    const sph = makeSphere(12,12,0.6);
    const sPosBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, sPosBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(sph.pos), gl.STATIC_DRAW);
    const sIdxBuf = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, sIdxBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(sph.idx), gl.STATIC_DRAW);
    const sColBuf = gl.createBuffer();
    // білий, непрозорий
    const sphCols = new Float32Array(sph.pos.length/3*4).fill(1.0);
    gl.bindBuffer(gl.ARRAY_BUFFER, sColBuf);
    gl.bufferData(gl.ARRAY_BUFFER, sphCols, gl.STATIC_DRAW);

    // --- Відрисовка ---
    let then=0;
    function render(now){
      now *= 0.001;
      const dt = now - then;
      then = now;

      gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

      // матриці
      const proj = mat4.create();
      mat4.perspective(proj, 45*Math.PI/180, canvas.width/canvas.height, 0.1, 100);
      gl.useProgram(programInfo.program);
      gl.uniformMatrix4fv(programInfo.uniformLocations.projectionMatrix,false,proj);

      const mv = mat4.create();
      mat4.translate(mv,mv,[0,0,-6]);
      mat4.rotate(mv,mv,now,[0,1,0]);
      mat4.rotate(mv,mv,now*0.7,[1,0,0]);

      // 1) малюємо сферу (запис у depth = true)
      gl.depthMask(true);
      gl.uniformMatrix4fv(programInfo.uniformLocations.modelViewMatrix,false,mv);
      gl.bindBuffer(gl.ARRAY_BUFFER,sPosBuf);
      gl.vertexAttribPointer(programInfo.attribLocations.vertexPosition,3,gl.FLOAT,false,0,0);
      gl.enableVertexAttribArray(programInfo.attribLocations.vertexPosition);
      gl.bindBuffer(gl.ARRAY_BUFFER,sColBuf);
      gl.vertexAttribPointer(programInfo.attribLocations.vertexColor,4,gl.FLOAT,false,0,0);
      gl.enableVertexAttribArray(programInfo.attribLocations.vertexColor);
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,sIdxBuf);
      gl.drawElements(gl.TRIANGLES, sph.idx.length, gl.UNSIGNED_SHORT,0);

      // 2) малюємо напівпрозору піраміду (запис у depth = false, порядок не критичний для простої форми)
      gl.depthMask(false);
      gl.uniformMatrix4fv(programInfo.uniformLocations.modelViewMatrix,false,mv);
      gl.bindBuffer(gl.ARRAY_BUFFER,pPosBuf);
      gl.vertexAttribPointer(programInfo.attribLocations.vertexPosition,3,gl.FLOAT,false,0,0);
      gl.enableVertexAttribArray(programInfo.attribLocations.vertexPosition);
      gl.bindBuffer(gl.ARRAY_BUFFER,pColBuf);
      gl.vertexAttribPointer(programInfo.attribLocations.vertexColor,4,gl.FLOAT,false,0,0);
      gl.enableVertexAttribArray(programInfo.attribLocations.vertexColor);
      gl.drawArrays(gl.TRIANGLES,0,18);

      gl.depthMask(true);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  </script>
</body>
</html>
