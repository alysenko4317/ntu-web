openapi: "3.0.3"

info:
  title: Library Base — REST API
  description: |
    REST API для навчального проєкту «Електронна бібліотека» (ЛР7).
    Побудований на базі MVC-застосунку з ЛР5/ЛР6.
  version: "1.0.0"

servers:
  - url: http://localhost:8087
    description: Docker Compose (app container)

tags:
  - name: Books
    description: CRUD-операції з книгами
  - name: Readers
    description: Дані читачів бібліотеки
  - name: Rooms
    description: Зали бібліотеки

paths:

  # ==================== Books ====================

  /api/books:
    get:
      tags: [Books]
      summary: Отримати список усіх книг
      description: Повертає масив книг разом з авторами.
      responses:
        "200":
          description: Масив книг
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

    post:
      tags: [Books]
      summary: Створити нову книгу
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
            example:
              code: "PHP-101"
              name: "PHP & MySQL for Beginners"
              release_date: "2023"
      responses:
        "201":
          description: Книгу створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: Некоректні дані
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/books/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID книги

    get:
      tags: [Books]
      summary: Отримати книгу за ID
      responses:
        "200":
          description: Книга знайдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Книгу не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [Books]
      summary: Оновити книгу
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
            example:
              name: "Updated Book Name"
              release_date: "2024"
      responses:
        "200":
          description: Книгу оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Книгу не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Books]
      summary: Видалити книгу
      responses:
        "204":
          description: Книгу видалено
        "404":
          description: Книгу не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==================== Readers ====================

  /api/readers:
    get:
      tags: [Readers]
      summary: Отримати список усіх читачів
      responses:
        "200":
          description: Масив читачів
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reader"

  /api/readers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID читача

    get:
      tags: [Readers]
      summary: Отримати читача за ID
      responses:
        "200":
          description: Читач знайдений
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reader"
        "404":
          description: Читача не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ==================== Rooms ====================

  /api/rooms:
    get:
      tags: [Rooms]
      summary: Отримати список залів бібліотеки
      responses:
        "200":
          description: Масив залів
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

# ==================== Schemas ====================

components:
  schemas:

    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: "PRG-001"
        name:
          type: string
          example: "Clean Code"
        releaseDate:
          type: string
          example: "2008"
        authors:
          type: array
          items:
            $ref: "#/components/schemas/Author"

    BookInput:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          example: "PRG-001"
        name:
          type: string
          example: "Clean Code"
        release_date:
          type: string
          nullable: true
          example: "2008"

    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: "Robert"
        lastName:
          type: string
          example: "Martin"

    Reader:
      type: object
      properties:
        id:
          type: integer
          example: 1
        ticket:
          type: string
          example: "T12345"
        firstName:
          type: string
          example: "Іван"
        lastName:
          type: string
          example: "Петренко"
        birthday:
          type: string
          example: "2000-01-15"
        phone:
          type: string
          example: "+380501234567"
        roomId:
          type: string
          example: "large"

    Room:
      type: object
      properties:
        id:
          type: string
          example: "large"
        name:
          type: string
          example: "Велика зала"

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Not found"
