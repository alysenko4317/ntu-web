services:

  app:
    build: .
    container_name: lr8-php-app
    ports:
      - "8089:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: library
      DB_USER: library_user
      DB_PASSWORD: library_pass
    networks:
      - lr8-network

  db:
    image: mysql:8.0
    container_name: lr8-mysql-db
    restart: unless-stopped
    ports:
      - "33080:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: library
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lr8-network

  bot:
    build: ./bot
    container_name: lr8-telegram-bot
    restart: unless-stopped
    depends_on:
      - app
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_BASE_URL: http://app:80
    networks:
      - lr8-network

  swagger:
    image: swaggerapi/swagger-ui
    container_name: lr8-swagger-ui
    ports:
      - "8090:8080"
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
      BASE_URL: /
    volumes:
      - ./swagger:/spec
    networks:
      - lr8-network

networks:
  lr8-network:
    driver: bridge

volumes:
  db_data:
